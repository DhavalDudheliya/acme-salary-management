# Render Blueprint: managed Postgres + Express API + static React SPA.
# Create from the Render dashboard: New > Blueprint, point it at this repo.
# See DEPLOYMENT.md for the full walkthrough (and the two manual steps:
# setting the SPA's API URL, and seeding the database once).

databases:
  - name: acme-salary-db
    databaseName: acme_salary_management
    user: acme
    plan: free

services:
  # --- Express + Prisma API -------------------------------------------------
  - type: web
    name: acme-salary-api
    runtime: node
    plan: free
    rootDir: server
    # Render sets NODE_ENV=production, which would skip devDependencies; the
    # build needs tsc + the Prisma CLI, so force them in.
    buildCommand: npm install --include=dev && npm run build
    # On boot: apply migrations, then seed (idempotent — skips if employees
    # already exist, so no shell is needed and redeploys don't wipe data),
    # then start the server.
    startCommand: npx prisma migrate deploy && npm run seed && npm run start
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: acme-salary-db
          property: connectionString

  # --- React (Vite) static SPA ---------------------------------------------
  - type: web
    name: acme-salary-web
    runtime: static
    rootDir: client
    buildCommand: npm install --include=dev && npm run build
    staticPublishPath: dist
    envVars:
      # Vite bakes this in at build time. There is NO safe default: the API's
      # onrender.com subdomain is assigned per account and the plain name may be
      # taken globally (a wrong guess points the SPA at a stranger's service).
      # Set this to your API service's real public URL + /api in the dashboard,
      # then redeploy this static site. (See DEPLOYMENT.md.)
      - key: VITE_API_BASE_URL
        sync: false
    routes:
      # SPA fallback so client-side routes (e.g. /employees/:id) resolve.
      - type: rewrite
        source: /*
        destination: /index.html
